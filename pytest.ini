[pytest]
pythonpath = .
addopts =
    --alluredir=allure-results
    -v
    --clean-alluredir
    -p plugins.allure_plugin
    -m "not setup"

markers =
    smoke: critical subset of tests
    regression: full regression suite
    transaction: tests that perform real operations (use with caution)
    exclude: excluded from scheduled runs
    setup: one-time state-setup tests, run explicitly with -m setup

log_cli = true
log_cli_level = INFO