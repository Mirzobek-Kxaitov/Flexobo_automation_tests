stages:
  - setup
  - test

# Umumiy sozlamalar
.base:
  image: python:3.12
  before_script:
    - pip install playwright pytest pytest-playwright python-dotenv allure-pytest pytest-rerunfailures pytest-timeout
    - playwright install chromium
    - playwright install-deps chromium
    - echo "EMAIL=$EMAIL" >> .env
    - echo "PASSWORD=$PASSWORD" >> .env
    - echo "BASE_URL=$BASE_URL" >> .env
    - echo "APP_URL=$APP_URL" >> .env
    - echo "BROKER_EMAIL=$BROKER_EMAIL" >> .env
    - echo "BROKER_PASSWORD=$BROKER_PASSWORD" >> .env
    - echo "LOAD_OWNER_EMAIL=$LOAD_OWNER_EMAIL" >> .env
    - echo "LOAD_OWNER_PASSWORD=$LOAD_OWNER_PASSWORD" >> .env
    - echo "CARRIER_EMAIL=$CARRIER_EMAIL" >> .env
    - echo "CARRIER_PASSWORD=$CARRIER_PASSWORD" >> .env
    - echo "OWNER_OPERATOR_EMAIL=$OWNER_OPERATOR_EMAIL" >> .env
    - echo "OWNER_OPERATOR_PASSWORD=$OWNER_OPERATOR_PASSWORD" >> .env
    - echo "FREE_BROKER_EMAIL=$FREE_BROKER_EMAIL" >> .env
    - echo "FREE_BROKER_PASSWORD=$FREE_BROKER_PASSWORD" >> .env
    - echo "FREE_LOAD_OWNER_EMAIL=$FREE_LOAD_OWNER_EMAIL" >> .env
    - echo "FREE_LOAD_OWNER_PASSWORD=$FREE_LOAD_OWNER_PASSWORD" >> .env
    - echo "FREE_CARRIER_EMAIL=$FREE_CARRIER_EMAIL" >> .env
    - echo "FREE_CARRIER_PASSWORD=$FREE_CARRIER_PASSWORD" >> .env
    - echo "FREE_OWNER_OPERATOR_EMAIL=$FREE_OWNER_OPERATOR_EMAIL" >> .env
    - echo "FREE_OWNER_OPERATOR_PASSWORD=$FREE_OWNER_OPERATOR_PASSWORD" >> .env
    - echo "ADMIN_URL=$ADMIN_URL" >> .env
    - echo "ADMIN_EMAIL=$ADMIN_EMAIL" >> .env
    - echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" >> .env
  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

# 1-job: Usage reset (limit testlardan oldin)
reset-usage:
  stage: setup
  extends: .base
  timeout: 5 minutes
  script:
    - python scripts/reset_usage.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

# 2-job: Tez testlar (login, loads, trips, fleet, profile, permissions, bids)
fast-tests:
  stage: test
  extends: .base
  timeout: 60 minutes
  script:
    - >
      pytest tests/ -v
      --ignore=tests/test_bid_limit_enforcement.py
      --ignore=tests/test_bookings_limit_enforcement.py
      --ignore=tests/test_carrier_bids_limit.py
      --ignore=tests/test_carrier_company_employees_limit.py
      --ignore=tests/test_carrier_company_roles_limit.py
      --ignore=tests/test_carrier_fleet_limit.py
      --ignore=tests/test_company_roles_limit_enforcement.py
      --ignore=tests/test_fleet_limit_enforcement.py
      --ignore=tests/test_load_owner_bids_limit.py
      --ignore=tests/test_load_owner_company_roles_limit.py
      --ignore=tests/test_oo_active_transport_limit.py
      --ignore=tests/test_oo_bids_limit.py
      --ignore=tests/test_e2e_bid_accept_flow.py
      --ignore=tests/test_e2e_bid_accept_lifecycle.py
      --ignore=tests/test_e2e_bid_flow.py
      --ignore=tests/test_e2e_bid_reject_lifecycle.py
      --ignore=tests/test_e2e_broker_bid_accept_lifecycle.py
      --ignore=tests/test_e2e_broker_bid_flow.py
      --ignore=tests/test_e2e_broker_bid_reject_lifecycle.py
      --ignore=tests/test_e2e_oo_bid_accept_lifecycle.py
      --ignore=tests/test_e2e_oo_bid_flow.py
      --ignore=tests/test_e2e_oo_bid_reject_lifecycle.py
      --reruns 1 --timeout 180
      --alluredir=allure-results

# 3-job: Limit testlar (usage reset keyin)
limit-tests:
  stage: test
  extends: .base
  timeout: 60 minutes
  needs: ["reset-usage"]
  script:
    - >
      pytest
      tests/test_bid_limit_enforcement.py
      tests/test_bookings_limit_enforcement.py
      tests/test_carrier_bids_limit.py
      tests/test_carrier_company_employees_limit.py
      tests/test_carrier_company_roles_limit.py
      tests/test_carrier_fleet_limit.py
      tests/test_company_roles_limit_enforcement.py
      tests/test_fleet_limit_enforcement.py
      tests/test_load_owner_bids_limit.py
      tests/test_load_owner_company_roles_limit.py
      tests/test_oo_active_transport_limit.py
      tests/test_oo_bids_limit.py
      -v --reruns 1 --timeout 180
      --alluredir=allure-results

# 4-job: E2E bid testlar
e2e-tests:
  stage: test
  extends: .base
  timeout: 60 minutes
  needs: ["reset-usage"]
  script:
    - >
      pytest
      tests/test_e2e_bid_accept_flow.py
      tests/test_e2e_bid_accept_lifecycle.py
      tests/test_e2e_bid_flow.py
      tests/test_e2e_bid_reject_lifecycle.py
      tests/test_e2e_broker_bid_accept_lifecycle.py
      tests/test_e2e_broker_bid_flow.py
      tests/test_e2e_broker_bid_reject_lifecycle.py
      tests/test_e2e_oo_bid_accept_lifecycle.py
      tests/test_e2e_oo_bid_flow.py
      tests/test_e2e_oo_bid_reject_lifecycle.py
      -v --reruns 1 --timeout 180
      --alluredir=allure-results
