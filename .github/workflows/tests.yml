name: Run E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Kuniga 2 marta: 08:00 va 18:00 Toshkent vaqti (UTC+5)
    - cron: "0 3 * * *"   # 03:00 UTC = 08:00 Toshkent
    - cron: "0 13 * * *"  # 13:00 UTC = 18:00 Toshkent
  workflow_dispatch: # Qo'lda ishga tushirish imkoniyati

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright pytest pytest-playwright python-dotenv allure-pytest pytest-rerunfailures pytest-timeout
          playwright install chromium
          playwright install-deps chromium

      - name: Create .env file
        run: |
          echo "EMAIL=${{ secrets.EMAIL }}" >> .env
          echo "PASSWORD=${{ secrets.PASSWORD }}" >> .env
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "APP_URL=${{ secrets.APP_URL }}" >> .env
          echo "BROKER_EMAIL=${{ secrets.BROKER_EMAIL }}" >> .env
          echo "BROKER_PASSWORD=${{ secrets.BROKER_PASSWORD }}" >> .env
          echo "LOAD_OWNER_EMAIL=${{ secrets.LOAD_OWNER_EMAIL }}" >> .env
          echo "LOAD_OWNER_PASSWORD=${{ secrets.LOAD_OWNER_PASSWORD }}" >> .env
          echo "CARRIER_EMAIL=${{ secrets.CARRIER_EMAIL }}" >> .env
          echo "CARRIER_PASSWORD=${{ secrets.CARRIER_PASSWORD }}" >> .env
          echo "OWNER_OPERATOR_EMAIL=${{ secrets.OWNER_OPERATOR_EMAIL }}" >> .env
          echo "OWNER_OPERATOR_PASSWORD=${{ secrets.OWNER_OPERATOR_PASSWORD }}" >> .env

      - name: Run tests
        run: pytest tests/ -v --reruns 2 --timeout 300 --alluredir=allure-results
        env:
          PLAYWRIGHT_SLOW_MO: "500"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
