name: Run E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"   # 08:00 Toshkent
  workflow_dispatch:
    inputs:
      test_targets:
        description: "Test fayllar (bo'sh = default stable pack)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Create .env file
        run: |
          {
            echo "EMAIL=${EMAIL}"
            echo "PASSWORD=${PASSWORD}"
            echo "BASE_URL=${BASE_URL}"
            echo "APP_URL=${APP_URL}"
            echo "BROKER_EMAIL=${BROKER_EMAIL}"
            echo "BROKER_PASSWORD=${BROKER_PASSWORD}"
            echo "LOAD_OWNER_EMAIL=${LOAD_OWNER_EMAIL}"
            echo "LOAD_OWNER_PASSWORD=${LOAD_OWNER_PASSWORD}"
            echo "CARRIER_EMAIL=${CARRIER_EMAIL}"
            echo "CARRIER_PASSWORD=${CARRIER_PASSWORD}"
            echo "OWNER_OPERATOR_EMAIL=${OWNER_OPERATOR_EMAIL}"
            echo "OWNER_OPERATOR_PASSWORD=${OWNER_OPERATOR_PASSWORD}"
            echo "FREE_BROKER_EMAIL=${FREE_BROKER_EMAIL}"
            echo "FREE_BROKER_PASSWORD=${FREE_BROKER_PASSWORD}"
            echo "FREE_LOAD_OWNER_EMAIL=${FREE_LOAD_OWNER_EMAIL}"
            echo "FREE_LOAD_OWNER_PASSWORD=${FREE_LOAD_OWNER_PASSWORD}"
            echo "FREE_CARRIER_EMAIL=${FREE_CARRIER_EMAIL}"
            echo "FREE_CARRIER_PASSWORD=${FREE_CARRIER_PASSWORD}"
            echo "FREE_OWNER_OPERATOR_EMAIL=${FREE_OWNER_OPERATOR_EMAIL}"
            echo "FREE_OWNER_OPERATOR_PASSWORD=${FREE_OWNER_OPERATOR_PASSWORD}"
          } > .env
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          APP_URL: ${{ secrets.APP_URL }}
          BROKER_EMAIL: ${{ secrets.BROKER_EMAIL }}
          BROKER_PASSWORD: ${{ secrets.BROKER_PASSWORD }}
          LOAD_OWNER_EMAIL: ${{ secrets.LOAD_OWNER_EMAIL }}
          LOAD_OWNER_PASSWORD: ${{ secrets.LOAD_OWNER_PASSWORD }}
          CARRIER_EMAIL: ${{ secrets.CARRIER_EMAIL }}
          CARRIER_PASSWORD: ${{ secrets.CARRIER_PASSWORD }}
          OWNER_OPERATOR_EMAIL: ${{ secrets.OWNER_OPERATOR_EMAIL }}
          OWNER_OPERATOR_PASSWORD: ${{ secrets.OWNER_OPERATOR_PASSWORD }}
          FREE_BROKER_EMAIL: ${{ secrets.FREE_BROKER_EMAIL }}
          FREE_BROKER_PASSWORD: ${{ secrets.FREE_BROKER_PASSWORD }}
          FREE_LOAD_OWNER_EMAIL: ${{ secrets.FREE_LOAD_OWNER_EMAIL }}
          FREE_LOAD_OWNER_PASSWORD: ${{ secrets.FREE_LOAD_OWNER_PASSWORD }}
          FREE_CARRIER_EMAIL: ${{ secrets.FREE_CARRIER_EMAIL }}
          FREE_CARRIER_PASSWORD: ${{ secrets.FREE_CARRIER_PASSWORD }}
          FREE_OWNER_OPERATOR_EMAIL: ${{ secrets.FREE_OWNER_OPERATOR_EMAIL }}
          FREE_OWNER_OPERATOR_PASSWORD: ${{ secrets.FREE_OWNER_OPERATOR_PASSWORD }}

      - name: Run stable web tests
        id: pytest
        run: |
          set +e
          pytest ${TEST_TARGETS} --reruns 2 --timeout 300 2>&1 | tee pytest-output.log
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit "${exit_code}"
        env:
          PLAYWRIGHT_SLOW_MO: "500"
          TEST_TARGETS: >-
            ${{ github.event.inputs.test_targets ||
            'tests/test_usage.py
            tests/test_usage_counters.py
            tests/test_loads_search.py
            tests/test_place_bid_flow.py
            tests/test_place_bid_submit.py
            tests/permissions/test_add_menu_permissions.py
            tests/permissions/test_cross_user_access.py::test_load_owner_save_does_not_modify_brokers_load' }}

      - name: Get Allure history from gh-pages
        if: always()
        run: |
          git fetch origin gh-pages --depth=1 || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout origin/gh-pages -- history/ 2>/dev/null || true
            if [ -d history ]; then
              mkdir -p allure-results/history
              cp -r history/* allure-results/history/
            fi
          fi

      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        if: always()
        run: |
          cp scripts/telegram_notify.py /tmp/telegram_notify.py
          cp pytest-output.log /tmp/pytest-output.log 2>/dev/null || true
          cp -r allure-report/history history-backup 2>/dev/null || true
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout --orphan gh-pages-tmp
          git rm -rf . 2>/dev/null || true
          cp -r allure-report/* .
          mkdir -p history
          cp -r history-backup/* history/ 2>/dev/null || true
          git add -A
          git commit -m "Allure Report #${{ github.run_number }}"
          git push origin gh-pages-tmp:gh-pages --force
          cp /tmp/telegram_notify.py telegram_notify.py
          cp /tmp/pytest-output.log pytest-output.log 2>/dev/null || true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.log

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TEST_STATUS: ${{ steps.pytest.outcome }}
          TELEGRAM_WORKFLOW: ${{ github.workflow }}
          TELEGRAM_BRANCH: ${{ github.ref_name }}
          TELEGRAM_EVENT: ${{ github.event_name }}
          TELEGRAM_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALLURE_REPORT_URL: https://mirzobek-kxaitov.github.io/Flexobo_automation_tests/
          PYTEST_LOG_PATH: pytest-output.log
        run: python telegram_notify.py
